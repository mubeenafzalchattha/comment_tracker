<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Inter, sans-serif;
      width: 250px;
      padding: 0;
      background: #FFF8DC;
      margin: 0;
    }

    .navbar {
      display: flex;
      background: #FFB6C1;
      border-bottom: 2px solid #FF69B4;
      margin-bottom: 12px;
      align-items: center;
    }

    .nav-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      color: #8B008B;
      transition: all 0.3s ease;
      border-bottom: 3px solid transparent;
    }

    .nav-tab:hover {
      background: #FFC0CB;
    }

    .nav-tab.active {
      color: #8B008B;
      border-bottom-color: #FF69B4;
      background: #FFB6C1;
    }

    .content {
      padding: 0 16px 16px 16px;
    }

    .card {
      padding: 16px;
      background: #FFF8DC;
      border-radius: 16px;
      box-shadow: 0 4px 12px rgba(255, 105, 180, 0.25);
      border: 1px solid #FFB6C1;
      text-align: center;
      margin-bottom: 12px;
      transition: transform 0.3s, opacity 0.3s;
    }

    .card.hidden {
      display: none;
    }

    h2 {
      color: #FF69B4;
      margin-bottom: 10px;
    }

    .count {
      font-size: 22px;
      color: #FF69B4;
      font-weight: bold;
      margin: 4px 0;
    }

    .sub {
      margin-top: 6px;
      color: #8B008B;
      font-size: 13px;
    }

    .progress-container {
      margin: 16px 0;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .progress-circle-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .progress-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #FFB6C1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .progress-circle svg {
      transform: rotate(-90deg);
      width: 120px;
      height: 120px;
    }

    .progress-circle circle {
      fill: none;
      stroke-width: 8;
    }

    .progress-circle .bg {
      stroke: #FFB6C1;
    }

    .progress-circle .progress {
      stroke: #FF69B4;
      stroke-dasharray: 283;
      stroke-dashoffset: 283;
      transition: stroke-dashoffset 0.3s ease;
    }

    .progress-circle-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .progress-circle-number {
      font-size: 24px;
      font-weight: bold;
      color: #FF69B4;
      line-height: 1;
    }

    .progress-circle-goal {
      font-size: 12px;
      color: #8B008B;
      margin-top: 4px;
    }

    .reset-btn {
      margin-top: 14px;
      width: 100%;
      padding: 8px;
      border: none;
      background: #FF69B4;
      color: white;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
    }

    .reset-btn:hover {
      background: #FF1493;
    }

    input.goal-input {
      width: 100%;
      margin-top: 10px;
      padding: 6px;
      border-radius: 8px;
      border: 1px solid #FFB6C1;
      text-align: center;
      background: #FFF8DC;
    }

    .settings-section {
      margin-bottom: 16px;
    }

    .settings-buttons {
      display: flex;
      gap: 8px;
    }

    .settings-buttons .reset-btn {
      margin-top: 0;
      flex: 1;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <div id="navX" class="nav-tab active">X</div>
    <div id="navLinkedIn" class="nav-tab">LinkedIn</div>
    <div id="navSettings" class="nav-tab">Settings</div>
  </div>

  <div class="content">
    <!-- X Card -->
    <div id="xCard" class="card">
      <div class="cardContent">
        <!-- <h2>X</h2> -->
        <!-- <p class="count">Replies: <span id="xCount">0</span></p> -->
        <div class="progress-container">
          <div class="progress-circle-wrapper">
            <div class="progress-circle">
              <svg>
                <circle class="bg" cx="60" cy="60" r="45"></circle>
                <circle class="progress" id="xProgressCircle" cx="60" cy="60" r="45"></circle>
              </svg>
              <div class="progress-circle-text">
                <div class="progress-circle-number" id="xProgressNumber">0</div>
                <div class="progress-circle-goal" id="xProgressGoal">/ 50</div>
              </div>
            </div>
          </div>
        </div>
        <p class="sub">Remaining: <span id="xRemaining">0</span></p>
        <p class="sub">Time: <span id="xTime">0m 0s</span></p>
      </div>
    </div>
    
    <!-- LinkedIn Card -->
    <div id="liCard" class="card hidden">
      <div class="cardContent">
        <!-- <h2>LinkedIn</h2> -->
        <!-- <p class="count">Replies: <span id="liCount">0</span></p> -->
        <div class="progress-container">
          <div class="progress-circle-wrapper">
            <div class="progress-circle">
              <svg>
                <circle class="bg" cx="60" cy="60" r="45"></circle>
                <circle class="progress" id="liProgressCircle" cx="60" cy="60" r="45"></circle>
              </svg>
              <div class="progress-circle-text">
                <div class="progress-circle-number" id="liProgressNumber">0</div>
                <div class="progress-circle-goal" id="liProgressGoal">/ 50</div>
              </div>
            </div>
          </div>
        </div>
        <p class="sub">Remaining: <span id="liRemaining">0</span></p>
        <p class="sub">Time: <span id="linkedinTime">0m 0s</span></p>
      </div>
    </div>

    <!-- Progress Chart -->
    <div id="progressChartCard" class="card" style="margin-top: 12px;">
      <h3 style="color: #FF69B4; margin-bottom: 12px; font-size: 14px; text-align: center;">7-Day Progress</h3>
      <div style="height: 200px; position: relative;">
        <div id="chartLoader" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10;">
          <div style="width: 40px; height: 40px; border: 4px solid #FFB6C1; border-top: 4px solid #FF69B4; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px;"></div>
          <div style="color: #8B008B; font-size: 12px;">Loading chart...</div>
        </div>
        <canvas id="progressChart" style="position: relative; z-index: 1;"></canvas>
      </div>
    </div>
    
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>

    <!-- Settings Card -->
    <div id="settingsCard" class="card hidden">
      <div class="cardContent">
        <h2 style="color: #FF69B4; margin-bottom: 16px;">Settings</h2>
        <div class="settings-section">
          <h3 style="color: #FF69B4; font-size: 14px; margin-bottom: 8px; text-align: left;">X Goal</h3>
          <input id="xGoalInput" class="goal-input" type="number" placeholder="Set X Goal">
        </div>
        <div class="settings-section" style="margin-top: 16px;">
          <h3 style="color: #FF69B4; font-size: 14px; margin-bottom: 8px; text-align: left;">LinkedIn Goal</h3>
          <input id="liGoalInput" class="goal-input" type="number" placeholder="Set LinkedIn Goal">
        </div>
        <div class="settings-buttons" style="margin-top: 20px;">
          <button id="saveGoals" class="reset-btn">Save Goals</button>
          <button id="reset" class="reset-btn" style="background:#FF1493;">Reset Counters</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
